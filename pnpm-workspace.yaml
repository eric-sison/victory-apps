packages:
  - "apps/*"
  - "packages/*"

# 1. New home for onlyBuiltDependencies
allowBuilds:
  esbuild: true
  lightningcss: true
  msw: true

# 2. New home for packageExtensions
packageExtensions:
  better-auth:
    peerDependenciesMeta:
      next:
        optional: true
      react:
        optional: true
      react-dom:
        optional: true
      "@tanstack/react-start":
        optional: true
      srvx:
        optional: true
      crossws:
        optional: true

# 3. New home for overrides
overrides:
  glob: "^10"
  rimraf: "^5"
  inflight: "npm:lru-cache@^10"
  esbuild: "0.27.7"

# 4. New home for supportedArchitectures
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - arm64
    - x64

minimumReleaseAgeExclude:
  - '@tanstack/react-start-rsc@0.1.12'
  - '@tanstack/react-start@1.168.12'
  - '@tanstack/start-plugin-core@1.171.5'
