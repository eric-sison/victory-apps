services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network
    ports:
      - "127.0.0.1:5432:5432" # bind to localhost only — never expose to 0.0.0.0 in prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    shm_size: 128mb # prevents shared memory errors under load
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: '"Authorized users only."'
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 40 # ERROR only
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pg-admin.json:/pgadmin4/servers.json:ro # pre-register postgres server
    networks:
      - db_network
    ports:
      - "127.0.0.1:5050:80" # access via http://localhost:5050
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Mailpit — dev-only email capture (SMTP trap + web UI)
  # All outgoing mail in development is caught here instead of being delivered.
  # Configure your app's SMTP settings:
  #   host: localhost (or "mailpit" from within other containers)
  #   port: 1025
  #   no auth, no TLS required
  # Web UI: http://localhost:8025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-dev
    restart: unless-stopped
    networks:
      - db_network
    ports:
      - "127.0.0.1:1025:1025" # SMTP — point your app here
      - "127.0.0.1:8025:8025" # Web UI — http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500 # keep last 500 messages before auto-pruning
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1 # accept any user/password (dev convenience)
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  mailpit_data:
    driver: local

networks:
  db_network:
    driver: bridge
    internal: false
