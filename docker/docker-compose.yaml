# =============================================================================
# victory-apps — Docker Compose (production)
#
# apps/api has been merged into apps/admin. The Hono API is embedded inside
# the TanStack Start app and served from the same Nitro server on port 3000.
# There is no separate api service — admin handles both UI and API.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: victory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
      - public
    ports:
      - "127.0.0.1:5432:5432"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # pgAdmin — optional database GUI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: victory-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - internal
      - public
    ports:
      - "127.0.0.1:5050:80"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ---------------------------------------------------------------------------
  # Migrator — runs db:migrate + seed:admin, then exits
  # ---------------------------------------------------------------------------
  migrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrator
    container_name: victory-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Required to satisfy apps/admin/src/utils/env.ts validation at startup.
      # drizzle.config.ts imports env.ts, which validates all vars eagerly —
      # even ones the migrator doesn't actually use at runtime.
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RESET_PASSWORD_CALLBACK: ${RESET_PASSWORD_CALLBACK}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ---------------------------------------------------------------------------
  # Admin — TanStack Start (Nitro) SSR app + embedded Hono API
  #
  # The Hono API is mounted at /api/* via a TanStack Start wildcard route.
  # This single container serves both the admin UI and all API endpoints,
  # including /api/healthcheck, /api/auth/*, /api/docs, etc.
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: admin
    container_name: victory-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Database — required for server-side auth session helpers
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Better Auth — server points to itself (API is embedded on the same server)
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # CORS — comma-separated list of allowed origins for the embedded Hono API
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Default admin user — used by the migrator seed (passed here for consistency)
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME}
      # SMTP — used by Better Auth for password reset emails
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # Password reset callback — URL Better Auth appends the reset token to
      RESET_PASSWORD_CALLBACK: ${RESET_PASSWORD_CALLBACK}
    networks:
      - internal
      - public
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # wget/curl/sh are not available in distroless — use Node.js http module
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:3000/api/healthcheck',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true # containers on this network cannot reach the internet
  public:
    driver: bridge
    internal: false # host port publishing works here
