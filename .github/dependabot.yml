version: 2

updates:
  # ─── Root & all workspace packages (npm ecosystem covers pnpm) ────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    ignore:
      # Transitive dep pinned by minimatch@3.x (via eslint-plugin-react).
      # Bumping directly has no effect; upgrade eslint-plugin-react instead.
      - dependency-name: "brace-expansion"
      # Transitive dep pinned by flat-cache (ESLint's cache layer).
      # Not a direct dep anywhere; bump has no effect.
      - dependency-name: "flatted"
      # Major version — needs a deliberate coordinated migration across the monorepo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Major version — needs deliberate migration alongside typescript-eslint and plugins.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle all React-related updates into one PR
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Bundle all TanStack updates into one PR
      tanstack:
        patterns:
          - "@tanstack/*"
      # Bundle all TypeScript ESLint updates into one PR
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      # Bundle all ESLint plugins into one PR
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "eslint-*"
      # Bundle Drizzle ORM + Kit together
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"

  # ─── apps/web ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "app:web"
    commit-message:
      prefix: "chore(deps)[web]"
      include: "scope"
    ignore:
      # Major version — needs a deliberate coordinated migration across the monorepo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Major version — needs deliberate migration alongside typescript-eslint and plugins.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # ─── apps/api ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "app:api"
    commit-message:
      prefix: "chore(deps)[api]"
      include: "scope"
    ignore:
      # Major version — needs a deliberate coordinated migration across the monorepo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Keep @types/node aligned with the node:20-slim Docker runtime.
      # Jumping to 21+ would mismatch the actual Node.js version in production.
      - dependency-name: "@types/node"
        versions: [">=21"]

  # ─── packages/auth ────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/auth"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "package:auth"
    commit-message:
      prefix: "chore(deps)[auth]"
      include: "scope"
    ignore:
      # Major version — needs a deliberate coordinated migration across the monorepo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # ─── packages/ui ──────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "package:ui"
    commit-message:
      prefix: "chore(deps)[ui]"
      include: "scope"
    ignore:
      # Major version — needs a deliberate coordinated migration across the monorepo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Major version — needs deliberate migration alongside typescript-eslint and plugins.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # ─── Docker ───────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)[docker]"
      include: "scope"
    ignore:
      # Major Node.js runtime upgrades need deliberate testing.
      # The whole stack (Dockerfile, @types/node, CI) must be updated together.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)[ci]"
      include: "scope"
